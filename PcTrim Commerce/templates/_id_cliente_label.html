{% if id_cliente %}
<style>
	.id-cliente-topo {
		position: fixed;
		top: 12px;
		left: 50%;
		transform: translateX(-50%);
		background: #fff;
		color: #4a55d8;
		padding: 7px 18px;
		font-size: 15px;
		font-weight: 700;
		z-index: 9999;
		border-radius: 18px;
		box-shadow: 0 2px 8px rgba(0,0,0,0.10);
		border: 1px solid #dfe3ff;
		min-width: 90px;
		text-align: center;
		letter-spacing: 1px;
		opacity: 0.93;
		pointer-events: none;
	}
</style>
<div class="id-cliente-topo">
	ID Cliente: {{ id_cliente }}<br>
	<span style="font-size:13px; color:#222; font-weight:400;">{{ nome_fantasia or '' }}</span>
</div>
{% endif %}
