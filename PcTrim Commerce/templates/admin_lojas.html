<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <script>(function(){try{var k='lojaonline_theme',v=localStorage.getItem(k),t=(v==='light'||v==='dark')?v:'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Lojas | {{ nome_fantasia or 'Plataforma' }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='ui_touch.css') }}">
  {% include 'partials/topbar_meta_assets.html' %}
  {% include 'partials/context_hint_assets.html' %}
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root { --bg:#0f0f14; --surface:#1a1a28; --line:#2a2a40; --text:#e8e8f0; --muted:#888fa0; --purple:#7c3aed; --green:#10b981; --danger:#f87171; }
    html[data-theme="light"] { --bg:#f1f5f9; --surface:#fff; --line:#c8d0e0; --text:#0f172a; --muted:#64748b; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Outfit, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 20px 16px 40px; }
    .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .topbar a { color: var(--muted); text-decoration: none; display: inline-flex; align-items: center; padding: 6px; border-radius: 8px; }
    .topbar a:hover { color: var(--text); background: rgba(124,58,237,.12); }
    h1 { margin: 0 0 6px; font-size: 1.35rem; }
    .sub { margin: 0 0 20px; color: var(--muted); font-size: 14px; line-height: 1.45; }
    .card { background: var(--surface); border: 0.5px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .card h2 { margin: 0 0 12px; font-size: 1rem; }
    .grid { display: grid; gap: 10px; }
    @media (min-width: 640px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 0.5px solid var(--line); background: var(--bg); color: var(--text); font-family: inherit; font-size: 14px; }
    select { width: 100%; padding: 10px 12px; border-radius: 10px; border: 0.5px solid var(--line); background: var(--bg); color: var(--text); font-family: inherit; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: var(--purple); box-shadow: 0 0 0 2px rgba(124,58,237,.2); }
    .btn { border: none; border-radius: 10px; padding: 11px 16px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: var(--purple); color: #fff; width: 100%; margin-top: 6px; }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-ghost { background: transparent; border: 0.5px solid var(--line); color: var(--text); }
    .btn-edit { padding: 6px 12px; font-size: 12px; white-space: nowrap; }
    .modal-overlay { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 16px; background: rgba(0,0,0,.55); }
    .modal-overlay[hidden] { display: none; }
    .modal-panel { width: 100%; max-width: 420px; background: var(--surface); border: 0.5px solid var(--line); border-radius: 14px; padding: 18px; }
    .modal-panel h3 { margin: 0 0 4px; font-size: 1rem; }
    .modal-meta { margin: 0 0 14px; color: var(--muted); font-size: 13px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .modal-actions .btn-primary { width: auto; margin-top: 0; }
    .alert { padding: 12px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 14px; display: none; }
    .alert.ok { display: block; background: rgba(16,185,129,.12); border: 0.5px solid rgba(16,185,129,.35); color: var(--green); }
    .alert.err { display: block; background: rgba(248,113,113,.12); border: 0.5px solid rgba(248,113,113,.35); color: var(--danger); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 0.5px solid var(--line); }
    th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; background: rgba(124,58,237,.15); color: var(--purple); }
    .pill-prod { background: rgba(16,185,129,.15); color: var(--green); }
    .pill-hml { background: rgba(245,158,11,.18); color: #f59e0b; }
    .env-card { border-color: rgba(124,58,237,.35); }
    .env-card[data-alvo="production"] { border-color: rgba(16,185,129,.4); }
    .env-card[data-alvo="homologation"] { border-color: rgba(245,158,11,.45); }
    .env-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
    .env-row > div { flex: 1; min-width: 180px; }
    .env-status { margin: 0; font-size: 13px; color: var(--muted); }
    .empty { color: var(--muted); font-size: 13px; padding: 12px 0; }
    .cliente-select-wrap { grid-column: 1 / -1; }
    .cliente-select-status { margin: 6px 0 0; font-size: 12px; color: var(--muted); min-height: 1.2em; }
    .cliente-select-status.err { color: var(--danger); }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <a href="{{ url_prefix }}/" title="Menu"><i data-lucide="home" width="18" height="18"></i></a>
      <div style="flex:1;">
        <h1>Administração — Lojas</h1>
        <p class="sub">Ambiente: <strong>Produção</strong> = cliente real | <strong>Homologação</strong> = testes</p>
      </div>
      <button type="button" class="btn btn-ghost" id="btn-refresh">Atualizar lista</button>
    </header>

    <div id="alert-box" class="alert" role="status"></div>

    <section class="card" aria-labelledby="form-title">
      <h2 id="form-title">Nova loja</h2>
      <form id="form-nova-loja" class="grid grid-2">
        <div class="cliente-select-wrap">
          <label for="filtro-cliente">Cliente (base Interno) *</label>
          <input id="filtro-cliente" type="search" placeholder="Buscar por Cliente, Fantasia ou KeyChave…" autocomplete="off" data-hint="Filtre e selecione o cliente cadastrado na base Interno.">
          <select id="id_cliente" name="id_cliente" required disabled data-hint="Somente clientes ativos ainda não cadastrados no Pctrim_Commerce.">
            <option value="">Carregando clientes…</option>
          </select>
          <p class="cliente-select-status" id="cliente-select-status" aria-live="polite"></p>
        </div>
        <div>
          <label for="nome">Nome fantasia *</label>
          <input id="nome" name="nome" required autocomplete="organization" placeholder="Ex.: Pizzaria do Centro" data-hint="Nome que aparece no sistema para esta loja.">
        </div>
        <div>
          <label for="cidade">Cidade</label>
          <input id="cidade" name="cidade" autocomplete="address-level2" placeholder="Ex.: Picos" data-hint="Cidade principal da loja — referência inicial.">
        </div>
        <div>
          <label for="usuario">Login do gerente *</label>
          <input id="usuario" name="usuario" required autocomplete="username" placeholder="Ex.: loja_centro" data-hint="Usuário de acesso do gerente desta loja.">
        </div>
        <div>
          <label for="ddd">DDD</label>
          <input id="ddd" name="ddd" inputmode="numeric" maxlength="3" placeholder="89" data-hint="DDD da região da loja.">
        </div>
        <div>
          <label for="telefone">Telefone</label>
          <input id="telefone" name="telefone" inputmode="tel" placeholder="99999-9999" data-hint="Telefone de contato da loja.">
        </div>
        <div>
          <label for="senha">Senha inicial *</label>
          <input id="senha" name="senha" type="password" required minlength="4" autocomplete="new-password" data-hint="Senha inicial do gerente — peça para trocar no primeiro acesso.">
        </div>
        <div>
          <label for="senha2">Confirmar senha *</label>
          <input id="senha2" name="senha2" type="password" required minlength="4" autocomplete="new-password" data-hint="Digite a mesma senha novamente.">
        </div>
        <div>
          <label for="ambiente">Ambiente do cliente *</label>
          <select id="ambiente" name="ambiente" required data-hint="Produção = pctrim_commerce. Homologação = pctrim_commerce_hml (login e pedidos neste banco).">
            <option value="production" selected>Produção</option>
            <option value="homologation">Homologação</option>
          </select>
        </div>
        <div>
          <label for="tipo_negocio">Tipo de negócio *</label>
          <select id="tipo_negocio" name="tipo_negocio" required data-hint="Restaurante: mesa e delivery. Varejo: PDV de balcão.">
            <option value="restaurante">Restaurante</option>
            <option value="varejo">Varejo</option>
          </select>
        </div>
        <div style="grid-column: 1 / -1;">
          <button type="submit" class="btn btn-primary" id="btn-submit">Criar loja</button>
        </div>
      </form>
    </section>

    <section class="card" aria-labelledby="list-title">
      <h2 id="list-title">Lojas cadastradas</h2>
      <div id="lista-lojas">
        <p class="empty">Carregando…</p>
      </div>
    </section>
  </div>

  <div id="modal-editar" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="modal-editar-title">
    <div class="modal-panel">
      <h3 id="modal-editar-title">Editar loja</h3>
      <p class="modal-meta" id="modal-editar-meta"></p>
      <label for="edit-ambiente">Ambiente do cliente *</label>
      <select id="edit-ambiente" required data-hint="Altera o banco MySQL usado no login e nas operações desta loja.">
        <option value="production">Produção</option>
        <option value="homologation">Homologação</option>
      </select>
      <label for="edit-tipo-negocio" style="margin-top:12px;">Tipo de negócio *</label>
      <select id="edit-tipo-negocio" required data-hint="Restaurante: mesa e delivery. Varejo: PDV de balcão.">
        <option value="restaurante">Restaurante</option>
        <option value="varejo">Varejo</option>
      </select>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="btn-edit-cancel">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btn-edit-save">Salvar</button>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const alertBox = document.getElementById("alert-box");
    const listaHost = document.getElementById("lista-lojas");
    const form = document.getElementById("form-nova-loja");
    const btnSubmit = document.getElementById("btn-submit");
    const idClienteSelect = document.getElementById("id_cliente");
    const filtroClienteInput = document.getElementById("filtro-cliente");
    const clienteSelectStatus = document.getElementById("cliente-select-status");
    let clientesInternos = [];
    let clientesInternosFiltrados = [];

    function setClienteSelectStatus(msg, isErr) {
      if (!clienteSelectStatus) return;
      clienteSelectStatus.textContent = msg || "";
      clienteSelectStatus.className = "cliente-select-status" + (isErr ? " err" : "");
    }

    function renderClienteOptions(list) {
      if (!idClienteSelect) return;
      const prev = idClienteSelect.value;
      idClienteSelect.innerHTML = "";
      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = list.length
        ? "Selecione um cliente…"
        : "Nenhum cliente elegível encontrado";
      idClienteSelect.appendChild(placeholder);
      list.forEach(function (c) {
        const opt = document.createElement("option");
        opt.value = String(c.id);
        opt.textContent = c.label || (c.cliente + " - " + c.fantasia + " - " + c.id);
        if (c.documento) opt.title = c.documento;
        opt.dataset.fantasia = c.fantasia || "";
        opt.dataset.cliente = c.cliente || "";
        idClienteSelect.appendChild(opt);
      });
      if (prev && list.some(function (c) { return String(c.id) === prev; })) {
        idClienteSelect.value = prev;
      }
      idClienteSelect.disabled = list.length === 0;
      btnSubmit.disabled = list.length === 0;
    }

    function aplicarFiltroClientes() {
      const q = (filtroClienteInput && filtroClienteInput.value || "").trim().toLowerCase();
      if (!q) {
        clientesInternosFiltrados = clientesInternos.slice();
      } else {
        clientesInternosFiltrados = clientesInternos.filter(function (c) {
          const blob = [c.cliente, c.fantasia, String(c.id), c.documento, c.label]
            .join(" ")
            .toLowerCase();
          return blob.indexOf(q) !== -1;
        });
      }
      renderClienteOptions(clientesInternosFiltrados);
    }

    function preencherNomeDoCliente() {
      const opt = idClienteSelect && idClienteSelect.selectedOptions[0];
      const nomeInput = document.getElementById("nome");
      if (!opt || !nomeInput || !idClienteSelect.value) return;
      const fantasia = (opt.dataset.fantasia || "").trim();
      if (fantasia) nomeInput.value = fantasia;
    }

    async function validarClienteSelecionado() {
      const id = idClienteSelect && idClienteSelect.value;
      if (!id) {
        setClienteSelectStatus("");
        return;
      }
      try {
        const r = await fetch("/api/clientes-internos-disponiveis/" + encodeURIComponent(id), {
          credentials: "same-origin",
          headers: { Accept: "application/json" },
        });
        const d = await r.json().catch(function () { return {}; });
        if (!r.ok || d.sucesso === false) {
          setClienteSelectStatus(d.erro || "Não foi possível validar o cliente.", true);
          return;
        }
        if (!d.disponivel) {
          setClienteSelectStatus("Este cliente não está mais disponível. Atualize a lista.", true);
          idClienteSelect.value = "";
          await loadClientesInternos();
          return;
        }
        setClienteSelectStatus("");
      } catch (e) {
        setClienteSelectStatus("Não foi possível validar o cliente.", true);
      }
    }

    async function loadClientesInternos() {
      if (!idClienteSelect) return;
      idClienteSelect.disabled = true;
      btnSubmit.disabled = true;
      idClienteSelect.innerHTML = '<option value="">Carregando clientes…</option>';
      setClienteSelectStatus("Carregando clientes…", false);
      try {
        const r = await fetch("/api/clientes-internos-disponiveis", {
          credentials: "same-origin",
          headers: { Accept: "application/json" },
        });
        const d = await r.json().catch(function () { return {}; });
        if (!r.ok || d.sucesso === false) {
          throw new Error((d && d.erro) || "Não foi possível carregar os clientes no momento");
        }
        clientesInternos = Array.isArray(d.clientes) ? d.clientes : [];
        clientesInternosFiltrados = clientesInternos.slice();
        if (filtroClienteInput) filtroClienteInput.value = "";
        renderClienteOptions(clientesInternosFiltrados);
        if (!clientesInternos.length) {
          setClienteSelectStatus("Nenhum cliente elegível encontrado", false);
        } else {
          setClienteSelectStatus(clientesInternos.length + " cliente(s) disponível(is)", false);
        }
      } catch (e) {
        idClienteSelect.innerHTML = '<option value="">Erro ao carregar</option>';
        setClienteSelectStatus(e.message || "Não foi possível carregar os clientes no momento", true);
      }
    }

    if (filtroClienteInput) {
      filtroClienteInput.addEventListener("input", aplicarFiltroClientes);
    }
    if (idClienteSelect) {
      idClienteSelect.addEventListener("change", function () {
        preencherNomeDoCliente();
        validarClienteSelecionado();
      });
    }

    const modalEditar = document.getElementById("modal-editar");
    const editTipoSelect = document.getElementById("edit-tipo-negocio");
    const editAmbienteSelect = document.getElementById("edit-ambiente");
    const modalEditarMeta = document.getElementById("modal-editar-meta");
    const btnEditSave = document.getElementById("btn-edit-save");
    const btnEditCancel = document.getElementById("btn-edit-cancel");
    let editIdCliente = null;

    function pillClass(amb) {
      return amb === "homologation" ? "pill pill-hml" : "pill pill-prod";
    }
    function ambLabel(amb) {
      return amb === "homologation" ? "Homologação" : "Produção";
    }

    function openEditModal(id, nome, tipo, ambiente) {
      editIdCliente = id;
      modalEditarMeta.textContent = "Loja #" + id + " — " + nome;
      editTipoSelect.value = tipo === "varejo" ? "varejo" : "restaurante";
      editAmbienteSelect.value = ambiente === "homologation" ? "homologation" : "production";
      modalEditar.hidden = false;
    }
    function closeEditModal() {
      modalEditar.hidden = true;
      editIdCliente = null;
    }

    async function saveEditTipo() {
      if (!editIdCliente) return;
      hideAlert();
      btnEditSave.disabled = true;
      btnEditSave.textContent = "Salvando…";
      try {
        const r = await fetch("/api/admin/lojas/" + encodeURIComponent(String(editIdCliente)), {
          method: "PATCH",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify({
            tipo_negocio: editTipoSelect.value,
            ambiente: editAmbienteSelect.value,
          }),
        });
        const d = await r.json().catch(() => ({}));
        if (!r.ok || d.sucesso === false) {
          throw new Error((d && d.erro) || "Falha ao atualizar loja");
        }
        closeEditModal();
        var msg = d.mensagem || "Loja atualizada.";
        if (d.requer_logout) {
          msg += " Faça logout e login de novo para operar no banco correto.";
        } else {
          msg += " Peça ao gerente recarregar a página (F5).";
        }
        showAlert(msg, true);
        await loadLojas();
      } catch (e) {
        showAlert(e.message || "Erro ao salvar", false);
      } finally {
        btnEditSave.disabled = false;
        btnEditSave.textContent = "Salvar";
      }
    }

    btnEditCancel.addEventListener("click", closeEditModal);
    btnEditSave.addEventListener("click", saveEditTipo);
    modalEditar.addEventListener("click", function (ev) {
      if (ev.target === modalEditar) closeEditModal();
    });

    function showAlert(msg, ok) {
      alertBox.textContent = msg;
      alertBox.className = "alert " + (ok ? "ok" : "err");
    }
    function hideAlert() {
      alertBox.className = "alert";
      alertBox.textContent = "";
    }
    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function loadLojas() {
      listaHost.innerHTML = '<p class="empty">Carregando…</p>';
      try {
        const r = await fetch("/api/admin/lojas", { credentials: "same-origin", headers: { Accept: "application/json" } });
        const d = await r.json().catch(() => ({}));
        if (!r.ok || d.sucesso === false) {
          throw new Error((d && d.erro) || "Falha ao carregar lojas");
        }
        const lojas = Array.isArray(d.lojas) ? d.lojas : [];
        if (!lojas.length) {
          listaHost.innerHTML = '<p class="empty">Nenhuma loja em dadosloja.</p>';
          return;
        }
        let html = '<table><thead><tr><th>ID</th><th>Nome</th><th>Ambiente</th><th>Banco</th><th>Tipo</th><th>Gerente</th><th>Cidade</th><th>Status</th><th>Ações</th></tr></thead><tbody>';
        lojas.forEach(function (l) {
          const st = l.ativo === false ? "Inativo" : "Ativo";
          const tipoRaw = l.tipo_negocio === "varejo" ? "varejo" : "restaurante";
          const tipo = tipoRaw === "varejo" ? "Varejo" : "Restaurante";
          const ambRaw = l.ambiente === "homologation" ? "homologation" : "production";
          const amb = ambLabel(ambRaw);
          const banco = l.banco_ativo || "—";
          html +=
            "<tr><td><span class=\"pill\">" + esc(l.id_cliente) + "</span></td>" +
            "<td>" + esc(l.nome) + "</td>" +
            "<td><span class=\"" + pillClass(ambRaw) + "\">" + esc(amb) + "</span></td>" +
            "<td><code style=\"font-size:11px;\">" + esc(banco) + "</code></td>" +
            "<td>" + esc(tipo) + "</td>" +
            "<td>" + esc(l.usuario_gerente || "—") + "</td>" +
            "<td>" + esc(l.cidade || "—") + "</td>" +
            "<td>" + esc(st) + "</td>" +
            "<td><button type=\"button\" class=\"btn btn-ghost btn-edit\" data-id=\"" + esc(l.id_cliente) + "\" data-nome=\"" + esc(l.nome) + "\" data-tipo=\"" + esc(tipoRaw) + "\" data-ambiente=\"" + esc(ambRaw) + "\">Editar</button></td></tr>";
        });
        html += "</tbody></table>";
        listaHost.innerHTML = html;
        listaHost.querySelectorAll(".btn-edit").forEach(function (btn) {
          btn.addEventListener("click", function () {
            openEditModal(
              parseInt(btn.getAttribute("data-id"), 10),
              btn.getAttribute("data-nome") || "",
              btn.getAttribute("data-tipo") || "restaurante",
              btn.getAttribute("data-ambiente") || "production"
            );
          });
        });
      } catch (e) {
        listaHost.innerHTML = '<p class="empty">' + esc(e.message || "Erro") + "</p>";
      }
    }

    form.addEventListener("submit", async function (ev) {
      ev.preventDefault();
      hideAlert();
      const senha = document.getElementById("senha").value;
      const senha2 = document.getElementById("senha2").value;
      if (senha !== senha2) {
        showAlert("Senha e confirmação não conferem.", false);
        return;
      }
      const idClienteRaw = idClienteSelect ? idClienteSelect.value.trim() : "";
      if (!idClienteRaw) {
        showAlert("Selecione um cliente.", false);
        return;
      }
      const payload = {
        id_cliente: parseInt(idClienteRaw, 10),
        nome: document.getElementById("nome").value.trim(),
        usuario: document.getElementById("usuario").value.trim(),
        senha: senha,
        senha_confirmacao: senha2,
        ddd: document.getElementById("ddd").value.trim(),
        telefone: document.getElementById("telefone").value.trim(),
        cidade: document.getElementById("cidade").value.trim(),
        tipo_negocio: document.getElementById("tipo_negocio").value,
        ambiente: document.getElementById("ambiente").value,
      };
      if (!Number.isFinite(payload.id_cliente) || payload.id_cliente <= 0) {
        showAlert("Selecione um cliente válido.", false);
        return;
      }
      btnSubmit.disabled = true;
      btnSubmit.textContent = "Criando…";
      try {
        const r = await fetch("/api/admin/lojas", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify(payload),
        });
        const d = await r.json().catch(() => ({}));
        if (!r.ok || d.sucesso === false) {
          throw new Error((d && d.erro) || "Falha ao criar loja");
        }
        showAlert(
          (d.mensagem || "Loja criada.") +
            " Entregue ao cliente: login \"" + esc(d.usuario) + "\" e a senha definida.",
          true
        );
        form.reset();
        document.getElementById("ambiente").value = "production";
        await loadClientesInternos();
        await loadLojas();
      } catch (e) {
        showAlert(e.message || "Erro ao criar loja", false);
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.textContent = "Criar loja";
      }
    });

    document.getElementById("btn-refresh").addEventListener("click", function () {
      loadLojas();
      loadClientesInternos();
    });
    loadClientesInternos();
    loadLojas();
  </script>
  {% include 'partials/context_hint_bar.html' %}
</body>
</html>
